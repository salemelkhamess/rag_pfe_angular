name: Build & Deploy Frontend

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/salemelkhamess/frontend

jobs:

  # ──────────────────────────────────────────
  # JOB 1 : Build et push l'image Angular
  # ──────────────────────────────────────────
  build:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────
  # JOB 2 : Redémarrer le frontend sur le serveur
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Deploy frontend on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/rag/rag-backend

            # Se connecter au registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Tirer la nouvelle image frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull frontend

            # Redémarrer uniquement le frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps frontend

            docker image prune -f
            echo "✅ Frontend déployé — SHA: ${{ github.sha }}"
