<aside class="sidebar" [class.collapsed]="isSidebarCollapsed" [class.mobile-open]="isMobileOpen">

  <!-- Logo -->
  <div class="sidebar-header">
    <div class="logo-wrap">
      <div class="logo-icon-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
      </div>
      <div class="logo-text" *ngIf="!isSidebarCollapsed">
        <span class="logo-brand">RAG</span>
        <span class="logo-sub">Admin</span>
      </div>
    </div>
    <button class="toggle-btn" (click)="toggleSidebar()" [title]="isSidebarCollapsed ? 'Développer' : 'Réduire'">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline *ngIf="!isSidebarCollapsed" points="15 18 9 12 15 6"/>
        <polyline *ngIf="isSidebarCollapsed"  points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <!-- Nav -->
  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li *ngFor="let item of menuItems()" class="nav-item">
        <a [routerLink]="item.path" routerLinkActive="active" class="nav-link"
           (click)="closeOnMobile()" [title]="isSidebarCollapsed ? item.label : ''">

          <span class="nav-icon">
            <!-- home -->
            <svg *ngIf="item.icon === 'home'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
              <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            <!-- docs -->
            <svg *ngIf="item.icon === 'docs'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            <!-- chat -->
            <svg *ngIf="item.icon === 'chat'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <!-- folder -->
            <svg *ngIf="item.icon === 'folder'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
            <!-- settings -->
            <svg *ngIf="item.icon === 'settings'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="8" rx="2" ry="2"/>
              <rect x="2" y="14" width="20" height="8" rx="2" ry="2"/>
              <line x1="6" y1="6" x2="6.01" y2="6"/>
              <line x1="6" y1="18" x2="6.01" y2="18"/>
            </svg>
            <!-- users -->
            <svg *ngIf="item.icon === 'users'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            <!-- audit -->
            <svg *ngIf="item.icon === 'audit'" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </span>

          <span class="nav-label" *ngIf="!isSidebarCollapsed">{{ item.label }}</span>

          <!-- Active dot (collapsed mode) -->
          <span class="active-dot" *ngIf="isSidebarCollapsed"></span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer" *ngIf="!isSidebarCollapsed">
    <div class="sidebar-footer-text">Intelligence Artificielle</div>
    <div class="sidebar-footer-ver">v1.0</div>
  </div>

</aside>

<!-- Mobile overlay -->
<div class="sidebar-overlay" *ngIf="isMobileOpen" (click)="closeMobile()"></div>
