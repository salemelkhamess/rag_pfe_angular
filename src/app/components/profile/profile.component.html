<div class="profile-container">
  <div class="header">
    <h2>Mon profil</h2>
    <p class="subtitle">Modifier votre nom et mot de passe (l'email ne peut pas être changé)</p>
  </div>

  @if (loading()) {
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Chargement...</p>
    </div>
  }

  @if (!loading()) {
    @if (success()) {
      <div class="alert-success">{{ success() }}</div>
    }
    @if (error()) {
      <div class="alert-error">{{ error() }}</div>
    }

    <div class="profile-grid">
      <section class="card">
        <h3>Informations personnelles</h3>
        <form [formGroup]="profileForm" (ngSubmit)="saveProfile()">
          <div class="form-group">
            <label>Email</label>
            <input type="email" [value]="email()" disabled class="readonly" />
            <span class="hint">L'email ne peut pas être modifié</span>
          </div>
          <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" formControlName="username" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="firstName">Prénom *</label>
              <input id="firstName" type="text" formControlName="firstName" />
            </div>
            <div class="form-group">
              <label for="lastName">Nom *</label>
              <input id="lastName" type="text" formControlName="lastName" />
            </div>
          </div>
          <button type="submit" class="btn-primary" [disabled]="submitting()">
            {{ submitting() ? 'Enregistrement...' : 'Enregistrer le profil' }}
          </button>
        </form>
      </section>

      <section class="card">
        <h3>Changer le mot de passe</h3>
        <form [formGroup]="passwordForm" (ngSubmit)="changePassword()">
          <div class="form-group">
            <label for="oldPassword">Mot de passe actuel *</label>
            <input id="oldPassword" type="password" formControlName="oldPassword" autocomplete="current-password" />
          </div>
          <div class="form-group">
            <label for="newPassword">Nouveau mot de passe *</label>
            <input id="newPassword" type="password" formControlName="newPassword" autocomplete="new-password" />
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirmer le mot de passe *</label>
            <input id="confirmPassword" type="password" formControlName="confirmPassword" autocomplete="new-password" />
          </div>
          <button type="submit" class="btn-secondary" [disabled]="passwordSubmitting()">
            {{ passwordSubmitting() ? 'Modification...' : 'Changer le mot de passe' }}
          </button>
        </form>
      </section>
    </div>
  }
</div>
